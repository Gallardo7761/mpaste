services:
  mpaste:
    image: eclipse-temurin:25-jdk
    container_name: mpaste
    restart: unless-stopped

    ports:
      - "127.0.0.1:10002:10002"

    networks:
      - backend-dev-net

    volumes:
      - ./target:/data
      - /home/jomaa/.config/backend/private.pem:/etc/backend/private.pem:ro
      - /home/jomaa/.config/backend/public.pem:/etc/backend/public.pem:ro

    working_dir: /data
    command: ["java", "-jar", "mpaste-1.0.0.jar"]

    environment:
      - SERVER_PORT=${MPASTE_PORT}
      - SERVER_SERVLET_CONTEXT_PATH=${MPASTE_CONTEXT_PATH}
      - SPRING_APPLICATION_NAME=${SPRING_APPLICATION_NAME_MPASTE}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_PRIVATE_KEY_PATH=${JWT_PRIVATE_KEY_PATH}
      - JWT_PUBLIC_KEY_PATH=${JWT_PUBLIC_KEY_PATH}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}

networks:
  backend-dev-net:
    external: true
spring:
  application:
    name: mpaste-service

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    time-zone: Europe/Madrid

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info
